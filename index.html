<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width,initial-scale=1">
<title>Math Art Generator Pro</title>
<style>
body{font-family:system-ui,sans-serif;background:#f4f6fb;margin:0;padding:20px}
.card{max-width:1200px;margin:auto;background:#fff;border-radius:32px;padding:20px;box-shadow:0 10px 30px rgba(0,0,0,.08)}
.row{display:flex;gap:10px;flex-wrap:wrap}
button,input,select{border-radius:999px;padding:12px 18px;border:1px solid #ddd}
button{cursor:pointer}
#img{width:100%;border-radius:20px;border:1px solid #ddd;margin-top:15px}
#status,#stats{margin-top:10px}
</style>
</head>
<body>
<div class="card">
<h2>Math Art Generator Pro</h2>
<div class="row">
<button id="gen">Generate</button>
<button id="cancel">Cancel</button>
<a id="download" download="math-art.png"><button type="button">Download PNG</button></a>
<input id="seed" placeholder="Seed (optional)">
<select id="style">
<option value="-1">Random Style</option>
<option value="1">Binary</option>
<option value="7">Heatmap</option>
<option value="8">Rainbow</option>
<option value="9">Plasma</option>
<option value="12">Fire</option>
<option value="13">Ice</option>
<option value="20">Posterized</option>
</select>
</div>
<div id="status">Ready</div>
<div id="stats"></div>
<img id="img">
<canvas id="c" hidden></canvas>
</div>
<script>
let cancelFlag=false;

function mulberry32(a){return function(){var t=a+=0x6D2B79F5;t=Math.imul(t^t>>>15,t|1);t^=t+Math.imul(t^t>>>7,t|61);return((t^t>>>14)>>>0)/4294967296}}
function randNormal(r,m,s){let u1=r(),u2=r();let z=Math.sqrt(-2*Math.log(u1))*Math.cos(2*Math.PI*u2);return m+s*z;}
function geometric(r,p=.2){return 1+Math.floor(Math.log(1-r())/Math.log(1-p));}

const unary=["sin","cos","tan","exp","log","sqrt","abs","cbrt","atan","sinh","cosh"];
const binary=["+","-","*","/","**"];

function term(r){
 let t=["x","y","Math.PI","Math.E",(r()*10-5).toFixed(4)];
 return t[Math.floor(r()*t.length)];
}
function expr(r,b){
 if(b<=0) return term(r);
 if(r()<0.5){
   return `Math.${unary[Math.floor(r()*unary.length)]}(${expr(r,b-1)})`;
 }
 let left=Math.floor(r()*b);
 let right=b-1-left;
 return `(${expr(r,left)} ${binary[Math.floor(r()*binary.length)]} ${expr(r,right)})`;
}

function hsl(h,s,l){
 s/=100;l/=100;
 const a=s*Math.min(l,1-l);
 const f=n=>{const k=(n+h/30)%12;return l-a*Math.max(Math.min(k-3,9-k,1),-1)};
 return [255*f(0),255*f(8),255*f(4)];
}

async function generate(){
 cancelFlag=false;
 document.getElementById("gen").disabled=true;
 const seedText=document.getElementById("seed").value.trim();
 const seed=seedText?Number(seedText):Math.floor(Math.random()*1e9);
 const r=mulberry32(seed);

 const w=Math.max(300,Math.round(randNormal(r,2000,500)));
 const h=Math.max(300,Math.round(randNormal(r,1000,250)));
 const deep=geometric(r,0.18);

 const f=expr(r,deep);
 eval("function implicitFunction(x,y){return "+f+";}");

 const canvas=document.getElementById("c");
 const ctx=canvas.getContext("2d");
 canvas.width=w; canvas.height=h;

 let style=parseInt(document.getElementById("style").value);
 if(style===-1) style=1+Math.floor(r()*20);

 const TILE=128;
 const total=Math.ceil(w/TILE)*Math.ceil(h/TILE);
 let done=0;

 for(let sy=0; sy<h; sy+=TILE){
   for(let sx=0; sx<w; sx+=TILE){
     if(cancelFlag){
       document.getElementById("status").textContent="Cancelled";
       document.getElementById("gen").disabled=false;
       return;
     }

     const tw=Math.min(TILE,w-sx);
     const th=Math.min(TILE,h-sy);
     const img=ctx.createImageData(tw,th);

     for(let py=0; py<th; py++){
       for(let px=0; px<tw; px++){
         let x=((sx+px)/w)*2-1;
         let y=((sy+py)/h)*2-1;
         let v=0;
         try{v=implicitFunction(x,y)}catch(e){}
         if(!isFinite(v)) v=0;
         let idx=(py*tw+px)*4;

         let R=0,G=0,B=0;
         let t=Math.min(1,Math.abs(v)%1);

         switch(style){
           case 7:
             [R,G,B]=hsl(240-240*t,100,50); break;
           case 8:
             [R,G,B]=hsl((t*360),100,50); break;
           case 9:
             R=127+127*Math.sin(v);
             G=127+127*Math.sin(v+2);
             B=127+127*Math.sin(v+4);
             break;
           case 12:
             R=255; G=200*t; B=50*t; break;
           case 13:
             R=200*t; G=220*t; B=255; break;
           case 20:
             let q=Math.floor(t*8)/8*255;
             R=G=B=q; break;
           default:
             let c=Math.abs(v)<0.1?0:255;
             R=G=B=c;
         }

         img.data[idx]=R;
         img.data[idx+1]=G;
         img.data[idx+2]=B;
         img.data[idx+3]=255;
       }
     }

     ctx.putImageData(img,sx,sy);
     done++;
     document.getElementById("status").textContent="Processing "+Math.floor(done*100/total)+"%";
     await new Promise(requestAnimationFrame);
   }
 }

 const url=canvas.toDataURL("image/png");
 document.getElementById("img").src=url;
 document.getElementById("download").href=url;
 document.getElementById("status").textContent="Done";
 document.getElementById("stats").textContent=`Seed=${seed} | ${w}x${h} | Deep=${deep} | Style=${style} | Function=${f}`;
 document.getElementById("gen").disabled=false;
}

document.getElementById("gen").onclick=generate;
document.getElementById("cancel").onclick=()=>cancelFlag=true;
</script>
</body>
</html>
